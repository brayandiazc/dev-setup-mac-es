# ==============================================================================
# CI — Análisis estático de los scripts de shell con ShellCheck.
# ==============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Ejecutar ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"
          additional_files: ".github/scripts/setup-labels.sh"
          # Falla solo ante errores reales; las notas/avisos de estilo
          # (p. ej. comillas simples intencionales al escribir en .zshrc) no bloquean.
          severity: error
